<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Calculadora básica</title>

<link rel="stylesheet" href="estilos.css">

</head>

<body>

<div class="calculadora">

<h1>Calculadora básica</h1>

<input type="text" id="pantalla" readonly>

<div class="botones">

<button class="operador">sin</button>
<button class="operador">cos</button>
<button class="operador">tan</button>
<button class="operador">√</button>

<button class="numero">7</button>
<button class="numero">8</button>
<button class="numero">9</button>
<button class="operador">/</button>

<button class="numero">4</button>
<button class="numero">5</button>
<button class="numero">6</button>
<button class="operador">*</button>

<button class="numero">1</button>
<button class="numero">2</button>
<button class="numero">3</button>
<button class="operador">-</button>

<button class="numero">0</button>
<button class="operador">.</button>
<button id="resultado">=</button>
<button class="operador">+</button>

<button id="limpiar">C</button>

</div>

<h2>Historial</h2>

<ul id="historial"></ul>

</div>

<script src="script.js"></script>

</body>


</html>
